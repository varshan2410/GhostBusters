services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ghostbusters
      POSTGRES_USER: ghostbusters
      POSTGRES_PASSWORD: ghostbusters
    ports:
      - "5432:5432"
    volumes:
      - ghostbusters_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostbusters"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ghostbusters_redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ghostbusters_postgres:
  ghostbusters_redis:
